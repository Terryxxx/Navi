name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build release binary
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --bin navi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: navi-windows-x86_64
          path: src-tauri/target/release/navi.exe

      - name: Attach binary to existing Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/navi.exe
          generate_release_notes: true
