name: Bump version and tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          current=$(grep -m1 '^version' src-tauri/Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          echo "Current: $current"
          IFS=. read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "Next: $next"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Update version in Cargo.toml and plugin.json
        run: |
          set -euo pipefail
          next="${{ steps.ver.outputs.next }}"
          sed -i -E "0,/^version *= *\"[^\"]+\"/ s//version = \"${next}\"/" src-tauri/Cargo.toml
          sed -i -E "s/(\"version\"\s*:\s*)\"[^\"]+\"/\1\"${next}\"/" .claude-plugin/plugin.json

      - name: Refresh Cargo.lock version entry
        run: |
          # Update only the navi package's version line in Cargo.lock without rebuilding deps
          next="${{ steps.ver.outputs.next }}"
          python - <<PY
          import re, pathlib
          p = pathlib.Path("src-tauri/Cargo.lock")
          text = p.read_text()
          text = re.sub(
              r'(\[\[package\]\]\nname = "navi"\nversion = ")[^"]+(")',
              rf'\g<1>${{ steps.ver.outputs.next }}\g<2>',
              text, count=1
          )
          p.write_text(text)
          PY

      - name: Commit, tag, push
        run: |
          set -euo pipefail
          next="${{ steps.ver.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/Cargo.lock .claude-plugin/plugin.json
          git commit -m "chore: release v${next}"
          git tag "v${next}"
          git push origin HEAD
          git push origin "v${next}"
